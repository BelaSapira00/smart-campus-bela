<!-- JADWAL HARI INI -->
<div class="card">

  <h2>📚 Jadwal Hari Ini</h2>

  <div id="jadwalHariIni"></div>

</div>



<!-- PROGRESS TUGAS -->
<div class="card">

<!-- MOTIVASI -->

<style>

.home-card{
  text-align:center;
  background:linear-gradient(135deg,#f8c8dc,#ffdbe8);
}

.profile-img{

  width:140px;
  height:140px;

  border-radius:50%;

  object-fit:cover;

  border:5px solid #f8c8dc;

  display:block;

  margin:auto;

}

.card h2{
  margin-bottom:15px;
  color:#1e2a38;
}

.card p{
  line-height:1.8;
  font-size:16px;
}



/* JADWAL */
.jadwal-item{
  background:#fdf2f7;
  padding:15px;
  border-radius:14px;
  margin-top:15px;
  border-left:6px solid #f8c8dc;
  transition:0.3s;
}

.jadwal-item:hover{
  transform:translateX(5px);
}

.jadwal-item h3{
  margin-bottom:6px;
  color:#1e2a38;
}



/* PROGRESS */
.progress-bar{
  width:100%;
  background:#ececec;
  border-radius:30px;
  overflow:hidden;
  margin-top:8px;
}

.progress-fill{
  width:75%;
  background:#f8c8dc;
  color:#1e2a38;
  padding:10px;
  text-align:center;
  font-weight:bold;
  border-radius:30px;
}

.second{
  width:65%;
  background:#1e2a38;
  color:white;
}



/* MOBILE */
@media(max-width:600px){

  .profile{
    width:100px;
    height:100px;
  }

  .card{
    padding:18px;
  }

}

</style>



<script>
