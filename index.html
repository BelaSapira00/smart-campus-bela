<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Campus Bela</title>

<link rel="manifest" href="manifest.json">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>

:root{
  --navy:#1e2a38;
  --pink:#f8c8dc;
  --bg:#fdf2f7;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:var(--bg);
  color:var(--navy);
  transition:0.3s;
}



/* DARK MODE */
body.dark-mode{
  background:#121212;
  color:white;
}

body.dark-mode nav{
  background:#0d1117;
}

body.dark-mode .card{
  background:#1e1e1e;
  color:white;
}

body.dark-mode .bottom-nav{
  background:#1e1e1e;
}

body.dark-mode .bottom-nav a{
  color:white;
}



/* SPLASH */
#splash{
  position:fixed;
  width:100%;
  height:100vh;
  background:linear-gradient(
    135deg,
    var(--navy),
    #32485f
  );
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  z-index:9999;
}

#splash h1{
  font-size:35px;
}

#splash p{
  margin-top:10px;
}



/* NAVBAR */
nav{
  background:var(--navy);
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:1000;
}

.logo{
  font-size:24px;
  font-weight:bold;
}



/* RIGHT MENU */
.right-menu{
  display:flex;
  align-items:center;
  gap:15px;
}



/* NOTIF */
.notif-btn{
  font-size:24px;
  cursor:pointer;
}



/* CONTENT */
#content{
  padding:20px;
  margin-bottom:100px;
}



/* CARD */
.card{
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  margin-bottom:20px;
}



/* FLOAT BUTTON */
.fab{
  position:fixed;
  right:20px;
  bottom:90px;

  width:55px;
  height:55px;

  border:none;
  border-radius:50%;

  background:var(--pink);
  color:var(--navy);

  font-size:28px;

  cursor:pointer;

  z-index:9999;

  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}



/* THEME BUTTON */
#themeToggle{

  position:fixed;

  left:20px;
  bottom:90px;

  width:60px;
  height:60px;

  border:none;
  border-radius:50%;

  background:#1e2a38;
  color:white;

  font-size:26px;

  cursor:pointer;

  z-index:999999;

  box-shadow:0 5px 20px rgba(0,0,0,0.3);

}



/* TOAST */
#toast{
  position:fixed;
  top:20px;
  right:20px;

  background:var(--navy);
  color:white;

  padding:12px 18px;

  border-radius:10px;

  display:none;

  z-index:99999;
}



/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;

  width:100%;

  background:white;

  display:flex;
  justify-content:space-around;

  padding:14px;

  box-shadow:0 -3px 10px rgba(0,0,0,0.1);

  z-index:999;
}

.bottom-nav a{
  text-decoration:none;
  color:var(--navy);
  font-size:14px;
  font-weight:bold;
}



/* MOBILE */
@media(max-width:768px){

  .bottom-nav a{
    font-size:12px;
  }

}

</style>
</head>

<body>



<!-- SPLASH -->
<div id="splash">

  <h1>
    Smart Campus
  </h1>

  <p>
    Welcome Bela 🚀
  </p>

</div>



<!-- NAVBAR -->
<nav>

  <div class="logo">
    SmartCampus
  </div>



  <div class="right-menu">

    <!-- NOTIF -->
    <div class="notif-btn menu"
         data-page="notifikasi.html">

      🔔

    </div>

  </div>

</nav>



<!-- CONTENT -->
<div id="content"></div>



<!-- FLOAT BUTTON -->
<button class="fab">

  +

</button>



<!-- THEME BUTTON -->
<button id="themeToggle">

  ☀️

</button>



<!-- TOAST -->
<div id="toast">

  Selamat datang Bela 💖

</div>



<!-- BOTTOM NAV -->
<div class="bottom-nav">

  <a href="#"
     class="menu active"
     data-page="dashboard.html">

    🏠 Home

  </a>



  <a href="#"
     class="menu"
     data-page="jadwal.html">

    📅 Jadwal

  </a>



  <a href="#"
     class="menu"
     data-page="tugas.html">

    📚 Tugas

  </a>



  <a href="#"
     class="menu"
     data-page="profil.html">

    👤 Profil

  </a>

</div>



<script src="script.js"></script>

</body>
</html>
